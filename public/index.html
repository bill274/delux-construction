<meta charset="UTF-8">

<title>De Lux Construction · Operations</title>
<style>
  :root {
    --bg: #f7f5ef;
    --surface: #ffffff;
    --surface-2: #f1efe8;
    --text: #2c2c2a;
    --text-muted: #5f5e5a;
    --text-dim: #888780;
    --border: rgba(44,44,42,0.15);
    --border-strong: rgba(44,44,42,0.3);
    --accent: #2c2c2a;
    --success-bg: #eaf3de; --success-text: #173404;
    --warn-bg: #faeeda;    --warn-text: #412402;
    --info-bg: #e6f1fb;    --info-text: #042c53;
    --danger-bg: #fcebeb;  --danger-text: #501313;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  /* Header */
  .top {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 40px; height: 40px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; border-radius: 8px; font-family: Georgia, serif;
  }
  .brand-name { font-size: 18px; font-weight: 500; }
  .brand-sub { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .top-right { display: flex; align-items: center; gap: 12px; }

  .lang-toggle { display: inline-flex; background: var(--surface-2); border-radius: 8px; padding: 3px; gap: 2px; }
  .lang-toggle button { font-size: 12px; padding: 4px 10px; border: none; background: transparent; cursor: pointer; border-radius: 6px; color: var(--text-muted); }
  .lang-toggle button.active { background: var(--surface); color: var(--text); font-weight: 500; }

  .user-chip { font-size: 13px; color: var(--text-muted); }
  .user-chip strong { color: var(--text); font-weight: 500; }
  .logout { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; text-decoration: underline; padding: 0 0 0 8px; }

  /* Login screen */
  .login-screen {
    min-height: 80vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px;
    padding: 2rem; width: 100%; max-width: 380px;
  }
  .login-card h1 { font-size: 18px; font-weight: 500; margin: 0 0 1.5rem; text-align: center; }
  .login-presets { display: grid; gap: 6px; margin-bottom: 1.5rem; }
  .login-presets button {
    text-align: left; padding: 10px 12px; font-size: 12px;
    background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 8px;
    cursor: pointer; color: var(--text); font-family: inherit;
  }
  .login-presets button:hover { border-color: var(--border-strong); }
  .login-presets b { display: block; font-size: 13px; margin-bottom: 2px; font-weight: 500; }
  .login-error { color: var(--danger-text); background: var(--danger-bg); padding: 8px; border-radius: 6px; font-size: 12px; margin-bottom: 8px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
  .tab {
    padding: 10px 16px; font-size: 14px; cursor: pointer; border: none; background: transparent;
    color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab:not(.active):hover { color: var(--text); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface-2); border-radius: 8px; padding: 1rem; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 500; }

  /* Cards */
  .card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px;
  }
  .card h3 { font-size: 15px; font-weight: 500; margin: 0 0 4px; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
  .badge.success { background: var(--success-bg); color: var(--success-text); }
  .badge.warn    { background: var(--warn-bg);    color: var(--warn-text); }
  .badge.info    { background: var(--info-bg);    color: var(--info-text); }
  .badge.danger  { background: var(--danger-bg);  color: var(--danger-text); }

  .muted { color: var(--text-muted); font-size: 12px; }

  /* Project list */
  .project-row { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; padding: 14px 0; border-bottom: 0.5px solid var(--border); }
  .project-row:last-child { border-bottom: none; }
  .project-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .progress { width: 120px; height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; background: var(--accent); }

  /* Gantt */
  .gantt-row { display: grid; grid-template-columns: 220px 1fr; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .gantt-row:last-child { border-bottom: none; }
  .gantt-track { position: relative; height: 28px; background: var(--surface-2); border-radius: 6px; }
  .gantt-bar {
    position: absolute; top: 4px; bottom: 4px; border-radius: 4px;
    display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 500;
    overflow: hidden; white-space: nowrap;
  }
  .gantt-bar.in_progress { background: #b5d4f4; color: #042c53; }
  .gantt-bar.scheduled   { background: #cecbf6; color: #26215c; }
  .gantt-bar.done        { background: #c0dd97; color: #173404; }
  .gantt-bar.behind      { background: #f4c0d1; color: #4b1528; }

  /* People */
  .person-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .person-row:last-child { border-bottom: none; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; background: var(--surface-2);
    display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 12px;
    flex-shrink: 0;
  }
  .person-info { flex: 1; min-width: 0; }
  .person-name { font-weight: 500; font-size: 14px; }

  /* Forms */
  label.field { display: block; font-size: 12px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  input[type="text"], input[type="date"], input[type="email"], input[type="password"], textarea, select {
    width: 100%; padding: 8px 10px; font-size: 14px; font-family: inherit;
    background: var(--surface); color: var(--text);
    border: 0.5px solid var(--border-strong); border-radius: 6px;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-block; padding: 8px 14px; font-size: 13px; font-weight: 500;
    background: var(--surface); color: var(--text); border: 0.5px solid var(--border-strong);
    border-radius: 6px; cursor: pointer; font-family: inherit;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }

  .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .checkbox { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; cursor: pointer; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-end { display: flex; gap: 8px; padding-top: 12px; border-top: 0.5px solid var(--border); margin-top: 12px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 10px 16px; background: var(--accent); color: #fff;
    border-radius: 8px; font-size: 13px; max-width: 90vw;
  }

  /* Inbox (worker view) */
  .inbox-item { padding: 12px; border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
  .inbox-item.pending { border-left: 2px solid var(--info-text); }
  .inbox-item.accepted { border-left: 2px solid var(--success-text); }
  .inbox-item.declined { border-left: 2px solid var(--danger-text); }

  /* Calendar */
  .cal-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .cal-toolbar .title-wrap { flex: 1; min-width: 180px; font-size: 16px; font-weight: 500; }
  .cal-view-toggle { display: inline-flex; gap: 2px; background: var(--background); border: 0.5px solid var(--border); border-radius: 6px; padding: 2px; }
  .cal-view-toggle button {
    padding: 4px 10px; border: none; background: transparent;
    border-radius: 4px; font-size: 12px; cursor: pointer; color: var(--text-muted);
  }
  .cal-view-toggle button.active { background: var(--surface); color: var(--text); font-weight: 500; }

  .cal-header-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: 6px 6px 0 0; overflow: hidden; }
  .cal-dow { background: var(--background); padding: 6px 0; text-align: center; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); overflow: hidden; border-radius: 0 0 6px 6px; }
  .cal-day {
    background: var(--surface); min-height: 90px; padding: 4px 6px;
    display: flex; flex-direction: column; gap: 2px; cursor: pointer;
    transition: background 0.1s;
  }
  .cal-day:hover { background: var(--background); }
  .cal-day.other-month { background: var(--background); opacity: 0.5; }
  .cal-day.today { background: #FEF3DD; }
  .cal-day.today .day-num { color: #7A4A00; font-weight: 700; }
  .day-num { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .cal-event {
    font-size: 10px; padding: 2px 5px; border-radius: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-left: 2px solid;
    cursor: pointer;
  }
  .cal-event.client_meeting { background: #E1F5EE; border-color: #1D9E75; color: #04342C; }
  .cal-event.designer_meeting { background: #F2E0F9; border-color: #8561F9; color: #2A0F53; }
  .cal-event.team_meeting { background: #DAEEFC; border-color: #378ADD; color: #042C53; }
  .cal-event.quote_request { background: #FAEEDA; border-color: #BA7517; color: #412402; }
  .cal-event.inspection { background: #FCEBEB; border-color: #E24B4A; color: #501313; }
  .cal-event.other { background: var(--background); border-color: #888; color: var(--text); }

  .cal-event-more { font-size: 10px; color: var(--text-muted); padding: 1px 5px; }

  .cal-list-item {
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px;
    padding: 10px 12px; margin-bottom: 6px; display: flex; gap: 10px; align-items: start;
    border-left: 3px solid;
    cursor: pointer;
  }
  .cal-list-item.client_meeting { border-left-color: #1D9E75; }
  .cal-list-item.designer_meeting { border-left-color: #8561F9; }
  .cal-list-item.team_meeting { border-left-color: #378ADD; }
  .cal-list-item.quote_request { border-left-color: #BA7517; }
  .cal-list-item.inspection { border-left-color: #E24B4A; }
  .cal-list-item.other { border-left-color: #888; }

  .cal-list-date {
    min-width: 64px; text-align: center; padding: 4px;
    background: var(--background); border-radius: 4px;
  }
  .cal-list-day { font-size: 18px; font-weight: 500; line-height: 1; }
  .cal-list-month { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
  .cal-list-content { flex: 1; min-width: 0; }
  .cal-list-title { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
  .cal-list-meta { font-size: 11px; color: var(--text-muted); }

  @media (max-width: 720px) {
    .cal-day { min-height: 60px; padding: 2px 3px; }
    .cal-event { font-size: 9px; padding: 1px 3px; }
    .cal-dow { font-size: 10px; }
  }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .gantt-row { grid-template-columns: 140px 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .checkbox-grid { grid-template-columns: 1fr; }
  }
</style>

const state = {
  lang: localStorage.getItem('delux_lang') || 'en',
  user: null,
  tab: 'projects',
  projects: [],
  tasks: [],
  people: { subs: [], workers: [] },
  inbox: [],
  assignments: [],
  events: [],
  calendarView: 'month',
  calendarDate: new Date(),
  toast: null,
};

const t = (key) => (i18n[state.lang][key] ?? key);

async function api(path, opts = {}) {
  const res = await fetch(path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
    credentials: 'include',
  });
  const text = await res.text();
  const json = text ? JSON.parse(text) : null;
  if (!res.ok) throw new Error(json?.error || res.statusText);
  return json;
}

function setLang(lang) {
  state.lang = lang;
  localStorage.setItem('delux_lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  render();
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 4000);
}

// ---------------------------- Initial load -------------------------------
async function bootstrap() {
  try {
    state.user = await api('/api/auth/me');
    await loadDataForRole();
  } catch {
    state.user = null;
  }
  render();
}

async function loadDataForRole() {
  if (!state.user) return;
  if (state.user.role === 'dispatcher') {
    state.tab = state.tab === 'inbox' ? 'projects' : state.tab;
    const [projects, tasks, people, events] = await Promise.all([
      api('/api/projects'),
      api('/api/tasks'),
      api('/api/people'),
      api('/api/events'),
    ]);
    state.projects = projects;
    state.tasks = tasks;
    state.people = people;
    state.events = events;
    state.assignments = await api('/api/assignments');
  } else {
    const [projects, inbox, people, events] = await Promise.all([
      api('/api/projects'),
      api('/api/assignments/mine'),
      api('/api/people'),
      api('/api/events'),
    ]);
    state.projects = projects;
    state.inbox = inbox;
    state.people = people;
    state.events = events;
    // External users default to Projects tab. Workers/crew_leads default to Inbox.
    if (!['projects', 'inbox', 'calendar'].includes(state.tab)) {
      state.tab = state.user.role === 'external' ? 'projects' : 'inbox';
    }
  }
}

    all: state.projects.length,
    active: state.projects.filter(p => p.status === 'active').length,

      <button class="tab ${filter==='active'?'active':''}" data-filter="active">${t('status_active')} (${statusCounts.active})</button>
      <button class="tab ${filter==='pending'?'active':''}" data-filter="pending">${t('status_pending')} (${statusCounts.pending})</button>

// --------------------------- Schedule tab ---------------------------------
function scheduleTab() {
  const wrap = document.createElement('div');
  // Compute time window from earliest start to latest due across all visible tasks
  const tasks = state.tasks;
  if (tasks.length === 0) { wrap.innerHTML = '<div class="card">No tasks yet.</div>'; return wrap; }
  const minDate = new Date(Math.min(...tasks.map(t => +new Date(t.start_date))));
  const maxDate = new Date(Math.max(...tasks.map(t => +new Date(t.due_date))));
  const totalDays = Math.max(1, Math.round((maxDate - minDate) / 86400000));

  wrap.innerHTML = `<div class="card" id="gantt"></div>`;
  const gantt = wrap.querySelector('#gantt');
  tasks.forEach(task => {
    const startOffset = (new Date(task.start_date) - minDate) / 86400000;
    const duration = Math.max(1, (new Date(task.due_date) - new Date(task.start_date)) / 86400000);
    const left = (startOffset / totalDays) * 100;
    const width = (duration / totalDays) * 100;
    const title = state.lang === 'zh' && task.title_zh ? task.title_zh : task.title_en;
    const projectName = state.lang === 'zh' && task.project_name_zh ? task.project_name_zh : task.project_name_en;

    const row = document.createElement('div');
    row.className = 'gantt-row';
    row.innerHTML = `
      <div>
        <div style="font-weight: 500;">${title}</div>
        <div class="muted">${projectName}</div>
      </div>
      <div class="gantt-track">
        <div class="gantt-bar ${task.status}" style="left: ${left}%; width: ${width}%;">
          ${task.status} · ${task.start_date}
        </div>
      </div>
    `;
    gantt.appendChild(row);
  });
  return wrap;
}

// --------------------------- Inbox (worker view) --------------------------
function inboxTab() {
  const wrap = document.createElement('div');
  if (state.inbox.length === 0) {
    wrap.innerHTML = `<div class="card">${t('no_inbox')}</div>`;
    return wrap;
  }

  state.inbox.forEach(a => {
    const isCancelled = a.status === 'cancelled';
    const status = isCancelled ? 'cancelled' : (a.response || 'pending');
    const title = state.lang === 'zh' && a.title_zh ? a.title_zh : a.title_en;
    const project = state.lang === 'zh' && a.project_name_zh ? a.project_name_zh : a.project_name_en;
    const notes = state.lang === 'zh' && a.notes_zh ? a.notes_zh : a.notes_en;

    const item = document.createElement('div');
    item.className = `inbox-item ${status}`;
    if (isCancelled) item.style.opacity = '0.6';
    item.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div>
          <div style="font-weight: 500; font-size: 15px; ${isCancelled ? 'text-decoration: line-through;' : ''}">${title}</div>
          <div class="muted">${project} · ${a.start_date} → ${a.due_date}</div>
        </div>
        <span class="badge ${isCancelled ? 'danger' : status === 'accepted' ? 'success' : status === 'declined' ? 'danger' : 'info'}">
          ${isCancelled ? t('assignment_cancelled') : t(status)}
        </span>
      </div>
      ${notes ? `<div style="margin-top: 8px; font-size: 13px;">${notes}</div>` : ''}
      ${a.safety_notes ? `<div style="margin-top: 6px; font-size: 12px; color: var(--text-muted);">⚠ ${a.safety_notes}</div>` : ''}
      ${(status === 'pending' && !isCancelled) ? `
        <div style="display: flex; gap: 8px; margin-top: 12px;">
          <button class="btn btn-primary" data-respond="accepted" data-id="${a.id}">${t('accept')}</button>
          <button class="btn" data-respond="declined" data-id="${a.id}">${t('decline')}</button>
        </div>
      ` : ''}
    `;
    wrap.appendChild(item);
  });

  setTimeout(() => {
    wrap.querySelectorAll('[data-respond]').forEach(btn => {
      btn.onclick = async () => {
        await api(`/api/assignments/${btn.dataset.id}/respond`, {
          method: 'POST', body: { response: btn.dataset.respond }
        });
        await loadDataForRole();
        render();
      };
    });
  }, 0);

  return wrap;
}

// ----------------------------- Main render --------------------------------
function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';

  if (!state.user) {
    root.appendChild(loginView());
    return;
  }

  root.appendChild(header());
  root.appendChild(tabs());

  let body;
  switch (state.tab) {
    case 'projects': body = projectsTab(); break;
    case 'schedule': body = scheduleTab(); break;
    case 'calendar': body = calendarTab(); break;
    case 'people':   body = peopleTab(); break;
    case 'assign':   body = assignTab(); break;
    case 'sent':     body = sentTab(); break;
    case 'manage':   body = manageTab(); break;
    case 'inbox':    body = inboxTab(); break;
    default: body = projectsTab();
  }
  root.appendChild(body);

  if (state.toast) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = state.toast;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }
}

function openModal(contentBuilder) {
  const overlay = document.createElement('div');
  overlay.style = 'position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;';
  const modal = document.createElement('div');
  modal.style = 'background: var(--surface); border-radius: 12px; padding: 1.5rem; max-width: 440px; width: 100%; max-height: 90vh; overflow-y: auto;';
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  contentBuilder(modal, () => overlay.remove());
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

// --------------------------- Calendar tab --------------------------------
function calendarTab() {
  const wrap = document.createElement('div');
  const isDispatcher = state.user.role === 'dispatcher';
  const view = state.calendarView || 'month';

  const monthNames = t('month_names').split(',');
  const dowShort = t('dow_short').split(',');

  const cur = state.calendarDate instanceof Date ? state.calendarDate : new Date();
  const year = cur.getFullYear();
  const month = cur.getMonth();
  const titleText = state.lang === 'zh' ? `${year}年 ${monthNames[month]}` : `${monthNames[month]} ${year}`;

  const toolbar = document.createElement('div');
  toolbar.className = 'cal-toolbar';
  toolbar.innerHTML = `
    <button class="btn" id="cal-prev">${t('prev_month')}</button>
    <button class="btn" id="cal-today">${t('today')}</button>
    <button class="btn" id="cal-next">${t('next_month')}</button>
    <div class="title-wrap">${titleText}</div>
    <div class="cal-view-toggle">
      <button data-view="month" class="${view==='month'?'active':''}">${t('view_month')}</button>
      <button data-view="list" class="${view==='list'?'active':''}">${t('view_list')}</button>
    </div>
    ${isDispatcher ? `<button class="btn btn-primary" id="cal-add">+ ${t('add_event')}</button>` : ''}
  `;
  wrap.appendChild(toolbar);

  const body = document.createElement('div');
  if (view === 'month') {
    body.appendChild(renderMonthView(year, month, dowShort));
  } else {
    body.appendChild(renderListView());
  }
  wrap.appendChild(body);

  setTimeout(() => {
    toolbar.querySelector('#cal-prev').onclick = () => {
      state.calendarDate = new Date(year, month - 1, 1);
      render();
    };
    toolbar.querySelector('#cal-next').onclick = () => {
      state.calendarDate = new Date(year, month + 1, 1);
      render();
    };
    toolbar.querySelector('#cal-today').onclick = () => {
      state.calendarDate = new Date();
      render();
    };
    toolbar.querySelectorAll('.cal-view-toggle button').forEach(b => {
      b.onclick = () => { state.calendarView = b.dataset.view; render(); };
    });
    const addBtn = toolbar.querySelector('#cal-add');
    if (addBtn) addBtn.onclick = () => openEventDialog(null, null);
  }, 0);

  return wrap;
}

function eventsOnDay(dateObj) {
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth() + 1).padStart(2, '0');
  const d = String(dateObj.getDate()).padStart(2, '0');
  const target = `${y}-${m}-${d}`;
  return (state.events || []).filter(ev => (ev.start_at || '').startsWith(target));
}

function renderMonthView(year, month, dowShort) {
  const container = document.createElement('div');

  // Header
  const header = document.createElement('div');
  header.className = 'cal-header-row';
  header.innerHTML = dowShort.map(d => `<div class="cal-dow">${d}</div>`).join('');
  container.appendChild(header);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  const firstOfMonth = new Date(year, month, 1);
  // Monday=0 ... Sunday=6
  let startDow = firstOfMonth.getDay() - 1;
  if (startDow < 0) startDow = 6;
  const gridStart = new Date(year, month, 1 - startDow);

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const isOther = d.getMonth() !== month;
    const dStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    const isToday = dStr === todayStr;

    const cell = document.createElement('div');
    cell.className = `cal-day${isOther ? ' other-month' : ''}${isToday ? ' today' : ''}`;
    cell.dataset.date = dStr;

    const dayNum = document.createElement('div');
    dayNum.className = 'day-num';
    dayNum.textContent = d.getDate();
    cell.appendChild(dayNum);

    const dayEvents = eventsOnDay(d);
    const maxShow = 3;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const pill = document.createElement('div');
      pill.className = `cal-event ${ev.type}`;
      const title = (state.lang === 'zh' && ev.title_zh) ? ev.title_zh : ev.title_en;
      const timeStr = ev.all_day ? '' : formatTimeShort(ev.start_at);
      pill.textContent = timeStr ? `${timeStr} ${title}` : title;
      pill.onclick = (e) => {
        e.stopPropagation();
        openEventDetail(ev);
      };
      cell.appendChild(pill);
    });
    if (dayEvents.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'cal-event-more';
      more.textContent = `+${dayEvents.length - maxShow} more`;
      cell.appendChild(more);
    }

    cell.onclick = () => openDayDetail(d);
    grid.appendChild(cell);
  }
  container.appendChild(grid);
  return container;
}

function renderListView() {
  const container = document.createElement('div');
  const events = (state.events || []).slice().sort((a, b) => (a.start_at || '').localeCompare(b.start_at || ''));
  if (events.length === 0) {
    container.innerHTML = `<div class="card">${t('no_events_today')}</div>`;
    return container;
  }
  const monthNames = t('month_names').split(',');
  events.forEach(ev => {
    const d = new Date(ev.start_at);
    const title = (state.lang === 'zh' && ev.title_zh) ? ev.title_zh : ev.title_en;
    const project = (state.lang === 'zh' && ev.project_name_zh) ? ev.project_name_zh : ev.project_name_en;
    const timeStr = ev.all_day ? t('event_all_day') : formatTimeShort(ev.start_at);

    const row = document.createElement('div');
    row.className = `cal-list-item ${ev.type}`;
    row.innerHTML = `
      <div class="cal-list-date">
        <div class="cal-list-day">${d.getDate()}</div>
        <div class="cal-list-month">${monthNames[d.getMonth()].substring(0, 3)}</div>
      </div>
      <div class="cal-list-content">
        <div class="cal-list-title">${title}</div>
        <div class="cal-list-meta">
          ${t('event_type_' + ev.type)} · ${timeStr}
          ${ev.location ? ' · ' + ev.location : ''}
          ${project ? ' · ' + project : ''}
        </div>
      </div>
    `;
    row.onclick = () => openEventDetail(ev);
    container.appendChild(row);
  });
  return container;
}

function formatTimeShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  if (state.lang === 'zh') {
    return `${h}:${m}`;
  }
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12 = h % 12 || 12;
  return m === '00' ? `${h12}${ampm}` : `${h12}:${m}${ampm}`;
}

function openDayDetail(dateObj) {
  const events = eventsOnDay(dateObj);
  const isDispatcher = state.user.role === 'dispatcher';
  const dStr = dateObj.toISOString().slice(0, 10);
  openModal((m, close) => {
    const monthNames = t('month_names').split(',');
    const titleText = state.lang === 'zh'
      ? `${dateObj.getFullYear()}年${monthNames[dateObj.getMonth()]}${dateObj.getDate()}日`
      : `${monthNames[dateObj.getMonth()]} ${dateObj.getDate()}, ${dateObj.getFullYear()}`;

    m.innerHTML = `<h3 style="margin: 0 0 12px;">${titleText}</h3><div id="day-events"></div>`;
    const list = m.querySelector('#day-events');
    if (events.length === 0) {
      list.innerHTML = `<div class="muted" style="text-align: center; padding: 1rem;">${t('no_events_today')}</div>`;
    } else {
      events.forEach(ev => {
        const title = (state.lang === 'zh' && ev.title_zh) ? ev.title_zh : ev.title_en;
        const item = document.createElement('div');
        item.className = `cal-list-item ${ev.type}`;
        item.style.margin = '0 0 6px 0';
        item.innerHTML = `
          <div class="cal-list-content">
            <div class="cal-list-title">${title}</div>
            <div class="cal-list-meta">
              ${t('event_type_' + ev.type)} · ${ev.all_day ? t('event_all_day') : formatTimeShort(ev.start_at)}
              ${ev.location ? ' · ' + ev.location : ''}
            </div>
          </div>
        `;
        item.onclick = () => { close(); openEventDetail(ev); };
        list.appendChild(item);
      });
    }
    const actions = document.createElement('div');
    actions.style = 'display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;';
    actions.innerHTML = `
      ${isDispatcher ? `<button class="btn btn-primary" id="day-add">+ ${t('add_event')}</button>` : ''}
      <button class="btn" id="day-close">${t('cancel')}</button>
    `;
    m.appendChild(actions);
    m.querySelector('#day-close').onclick = close;
    const addBtn = m.querySelector('#day-add');
    if (addBtn) addBtn.onclick = () => { close(); openEventDialog(null, dStr); };
  });
}

function openEventDetail(ev) {
  const isDispatcher = state.user.role === 'dispatcher';
  openModal((m, close) => {
    const title = (state.lang === 'zh' && ev.title_zh) ? ev.title_zh : ev.title_en;
    const project = (state.lang === 'zh' && ev.project_name_zh) ? ev.project_name_zh : ev.project_name_en;
    const notes = (state.lang === 'zh' && ev.notes_zh) ? ev.notes_zh : ev.notes_en;
    const startD = new Date(ev.start_at);

    const partsHtml = (ev.participants || []).map(p => {
      const n = (state.lang === 'zh' && p.name_zh) ? p.name_zh : p.name_en;
      return `<span class="badge info" style="margin: 0 4px 4px 0;">${n}</span>`;
    }).join('');

    m.innerHTML = `
      <h3 style="margin: 0 0 4px;">${title}</h3>
      <div class="muted" style="font-size: 12px; margin-bottom: 14px;">
        <span class="badge ${ev.type === 'inspection' ? 'danger' : ev.type === 'client_meeting' ? 'success' : 'info'}">${t('event_type_' + ev.type)}</span>
      </div>
      <div style="display: grid; gap: 8px; font-size: 13px;">
        <div><strong>${t('event_start')}:</strong> ${startD.toLocaleString()}</div>
        ${ev.end_at ? `<div><strong>${t('event_end')}:</strong> ${new Date(ev.end_at).toLocaleString()}</div>` : ''}
        ${ev.location ? `<div><strong>${t('event_location')}:</strong> ${ev.location}</div>` : ''}
        ${project ? `<div><strong>${t('event_project')}:</strong> ${project}</div>` : ''}
        ${notes ? `<div><strong>${t('event_notes')}:</strong><br>${notes.replace(/\n/g, '<br>')}</div>` : ''}
        ${partsHtml ? `<div><strong>${t('event_participants').split('(')[0]}:</strong><br>${partsHtml}</div>` : ''}
      </div>
      <div style="display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;">
        ${isDispatcher ? `
          <button class="btn" id="ev-delete" style="color: var(--danger-text);">${t('delete_event')}</button>
          <button class="btn" id="ev-edit">${t('edit_event')}</button>
        ` : ''}
        <button class="btn" id="ev-close">${t('cancel')}</button>
      </div>
    `;
    m.querySelector('#ev-close').onclick = close;
    const editBtn = m.querySelector('#ev-edit');
    if (editBtn) editBtn.onclick = () => { close(); openEventDialog(ev, null); };
    const delBtn = m.querySelector('#ev-delete');
    if (delBtn) delBtn.onclick = async () => {
      if (!confirm(t('confirm_delete_event'))) return;
      try {
        await api(`/api/events/${ev.id}`, { method: 'DELETE' });
        showToast(t('event_deleted'));
        close();
        await loadDataForRole();
        render();
      } catch (e) { alert(e.message); }
    };
  });
}

function openEventDialog(existing, dateHint) {
  openModal((m, close) => {
    const isEdit = !!existing;
    const now = new Date();
    const defStart = existing?.start_at
      ? existing.start_at.slice(0, 16)
      : (dateHint ? `${dateHint}T09:00` : `${now.toISOString().slice(0, 10)}T09:00`);
    const defEnd = existing?.end_at ? existing.end_at.slice(0, 16) : '';

    const projectOptions = ['<option value="">—</option>']
      .concat(state.projects.map(p => {
        const name = (state.lang === 'zh' && p.name_zh) ? p.name_zh : p.name_en;
        return `<option value="${p.id}">${name}</option>`;
      })).join('');

    // Candidates for participants: all users
    const userOpts = state.people.workers.map(u => {
      const name = (state.lang === 'zh' && u.name_zh) ? u.name_zh : u.name_en;
      const checked = (existing?.participants || []).some(p => p.user_id === u.id) ? 'checked' : '';
      return `<label style="display: inline-flex; align-items: center; gap: 6px; margin: 3px 10px 3px 0; font-size: 12px;">
        <input type="checkbox" name="ev-part" value="${u.id}" ${checked}/>
        ${name}
      </label>`;
    }).join('');

    m.style.maxWidth = '520px';
    m.innerHTML = `
      <h3 style="margin: 0 0 16px;">${isEdit ? t('edit_event') : t('add_event')}</h3>
      <label class="field">${t('event_type')} *</label>
      <select id="ev-type">
        <option value="client_meeting">${t('event_type_client_meeting')}</option>
        <option value="designer_meeting">${t('event_type_designer_meeting')}</option>
        <option value="team_meeting">${t('event_type_team_meeting')}</option>
        <option value="quote_request">${t('event_type_quote_request')}</option>
        <option value="inspection">${t('event_type_inspection')}</option>
        <option value="other">${t('event_type_other')}</option>
      </select>
      <label class="field" style="margin-top: 12px;">${t('event_title_en')} *</label>
      <input id="ev-title-en" type="text" value="${existing?.title_en || ''}" />
      <label class="field" style="margin-top: 12px;">${t('event_title_zh')}</label>
      <input id="ev-title-zh" type="text" value="${existing?.title_zh || ''}" />
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
        <div>
          <label class="field">${t('event_start')} *</label>
          <input id="ev-start" type="datetime-local" value="${defStart}" />
        </div>
        <div>
          <label class="field">${t('event_end')}</label>
          <input id="ev-end" type="datetime-local" value="${defEnd}" />
        </div>
      </div>
      <label style="display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 13px;">
        <input type="checkbox" id="ev-allday" ${existing?.all_day ? 'checked' : ''} />
        ${t('event_all_day')}
      </label>
      <label class="field" style="margin-top: 12px;">${t('event_location')}</label>
      <input id="ev-location" type="text" value="${existing?.location || ''}" />
      <label class="field" style="margin-top: 12px;">${t('event_project')}</label>
      <select id="ev-project">${projectOptions}</select>
      <label class="field" style="margin-top: 12px;">${t('event_notes')}</label>
      <textarea id="ev-notes" rows="3">${existing?.notes_en || ''}</textarea>
      <label class="field" style="margin-top: 12px;">${t('event_participants')}</label>
      <div style="max-height: 140px; overflow-y: auto; padding: 6px; background: var(--background); border-radius: 6px;">
        ${userOpts || '<div class="muted" style="font-size: 11px;">No users yet.</div>'}
      </div>
      <div style="display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;">
        <button class="btn" id="ev-cancel">${t('cancel')}</button>
        <button class="btn btn-primary" id="ev-save">${t('save')}</button>
      </div>
    `;
    if (existing) {
      m.querySelector('#ev-type').value = existing.type;
      if (existing.project_id) m.querySelector('#ev-project').value = String(existing.project_id);
    }
    m.querySelector('#ev-cancel').onclick = close;
    m.querySelector('#ev-save').onclick = async () => {
      const startVal = m.querySelector('#ev-start').value;
      const endVal = m.querySelector('#ev-end').value;
      if (!startVal) { alert(t('event_start') + ' required'); return; }
      const titleEn = m.querySelector('#ev-title-en').value.trim();
      if (!titleEn) { alert(t('event_title_en') + ' required'); return; }

      const participant_ids = Array.from(m.querySelectorAll('input[name="ev-part"]:checked')).map(i => Number(i.value));
      const projVal = m.querySelector('#ev-project').value;

      const body = {
        type: m.querySelector('#ev-type').value,
        title_en: titleEn,
        title_zh: m.querySelector('#ev-title-zh').value.trim() || null,
        start_at: startVal,
        end_at: endVal || null,
        all_day: m.querySelector('#ev-allday').checked ? 1 : 0,
        location: m.querySelector('#ev-location').value.trim() || null,
        notes_en: m.querySelector('#ev-notes').value.trim() || null,
        project_id: projVal ? Number(projVal) : null,
        participant_ids,
      };
      try {
        if (isEdit) {
          await api(`/api/events/${existing.id}`, { method: 'PUT', body });
          showToast(t('event_updated'));
        } else {
          await api('/api/events', { method: 'POST', body });
          showToast(t('event_added'));
        }
        close();
        await loadDataForRole();
        render();
      } catch (e) { alert(e.message); }
    };
  });
}

// --------------------------- Project documents dialog --------------------
async function openProjectDocsDialog(projectId) {
  const project = state.projects.find(p => p.id === projectId);
  const projectName = project
    ? ((state.lang === 'zh' && project.name_zh) ? project.name_zh : project.name_en)
    : '';
  const isDispatcher = state.user.role === 'dispatcher';

  let docs;
  try {
    docs = await api(`/api/projects/${projectId}/documents`);
  } catch (e) {
    alert(e.message);
    return;
  }

  openModal((m, close) => {
    m.style.maxWidth = '640px';

    const docsHtml = docs.length === 0
      ? `<div class="muted" style="text-align: center; padding: 1.5rem;">${t('no_documents')}</div>`
      : docs.map(d => {
          const title = (state.lang === 'zh' && d.title_zh) ? d.title_zh : d.title_en;
          const catLabel = t('cat_' + d.category);
          return `
            <div class="doc-item ${d.category}" style="background: var(--surface); border: 0.5px solid var(--border); border-left: 3px solid; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; display: flex; gap: 10px; align-items: start;">
              <div style="flex: 1; min-width: 0;">
                <div style="font-weight: 500; font-size: 13px; margin-bottom: 3px;">${title}</div>
                <div class="muted" style="font-size: 11px;">
                  <span class="badge info" style="font-size: 10px;">${catLabel}</span>
                  ${d.trade ? ` · ${d.trade}` : ''}
                  · ${d.added_by_name || ''}
                </div>
                ${d.notes ? `<div style="font-size: 11px; margin-top: 4px; color: var(--text-muted);">${d.notes}</div>` : ''}
              </div>
              <div style="display: flex; flex-direction: column; gap: 4px;">
                <a href="${d.dropbox_url}" target="_blank" rel="noopener" class="btn btn-primary" style="padding: 4px 10px; font-size: 11px; text-decoration: none; text-align: center;">${t('open_link')}</a>
                ${isDispatcher ? `
                  <button class="btn" data-edit-doc="${d.id}" style="padding: 4px 10px; font-size: 11px;">${t('edit')}</button>
                  <button class="btn" data-del-doc="${d.id}" style="padding: 4px 10px; font-size: 11px;">${t('delete')}</button>
                ` : ''}
              </div>
            </div>
          `;
        }).join('');

    m.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3 style="margin: 0;">📁 ${t('documents_btn')} — ${projectName}</h3>
        ${isDispatcher ? `<button class="btn btn-primary" id="doc-add" style="padding: 6px 12px; font-size: 12px;">+ ${t('add_document')}</button>` : ''}
      </div>
      <div id="doc-list" style="max-height: 60vh; overflow-y: auto;">${docsHtml}</div>
      <div style="display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;">
        <button class="btn" id="doc-close">${t('cancel')}</button>
      </div>
    `;

    // Color the border-left based on category using inline styles
    m.querySelectorAll('.doc-item').forEach(el => {
      const c = el.className.split(' ')[1];
      const colors = {
        design_set: '#1D9E75', construction_set: '#378ADD', designer_sketch: '#8561F9',
        dob_approved: '#BA7517', permits: '#E24B4A', inspection: '#B88D1C',
        tpp: '#5F5E5A', other: '#888'
      };
      if (colors[c]) el.style.borderLeftColor = colors[c];
    });

    m.querySelector('#doc-close').onclick = close;
    const addBtn = m.querySelector('#doc-add');
    if (addBtn) addBtn.onclick = () => { close(); openDocDialog(projectId, null); };
    m.querySelectorAll('[data-edit-doc]').forEach(b => {
      b.onclick = () => {
        const id = Number(b.dataset.editDoc);
        const doc = docs.find(d => d.id === id);
        close();
        openDocDialog(projectId, doc);
      };
    });
    m.querySelectorAll('[data-del-doc]').forEach(b => {
      b.onclick = async () => {
        if (!confirm(t('confirm_delete_doc'))) return;
        try {
          await api(`/api/documents/${b.dataset.delDoc}`, { method: 'DELETE' });
          showToast(t('doc_deleted'));
          close();
          openProjectDocsDialog(projectId);
        } catch (e) { alert(e.message); }
      };
    });
  });
}

function openDocDialog(projectId, existing) {
  openModal((m, close) => {
    const isEdit = !!existing;
    m.style.maxWidth = '500px';
    m.innerHTML = `
      <h3 style="margin: 0 0 16px;">${isEdit ? t('edit_document') : t('add_document')}</h3>
      <label class="field">${t('doc_category')} *</label>
      <select id="doc-cat">
        <option value="design_set">${t('cat_design_set')}</option>
        <option value="construction_set">${t('cat_construction_set')}</option>
        <option value="designer_sketch">${t('cat_designer_sketch')}</option>
        <option value="dob_approved">${t('cat_dob_approved')}</option>
        <option value="permits">${t('cat_permits')}</option>
        <option value="inspection">${t('cat_inspection')}</option>
        <option value="tpp">${t('cat_tpp')}</option>
        <option value="other">${t('cat_other')}</option>
      </select>

      <label class="field" style="margin-top: 12px;">${t('doc_title')} (English) *</label>
      <input id="doc-title-en" type="text" value="${existing?.title_en || ''}" placeholder="e.g. Electrical drawings - 131 Mercer" />

      <label class="field" style="margin-top: 12px;">${t('doc_title')} (中文)</label>
      <input id="doc-title-zh" type="text" value="${existing?.title_zh || ''}" placeholder="例:131 Mercer 电气图" />

      <label class="field" style="margin-top: 12px;">${t('doc_dropbox_url')} *</label>
      <input id="doc-url" type="url" value="${existing?.dropbox_url || ''}" placeholder="https://www.dropbox.com/scl/..." />

      <label class="field" style="margin-top: 12px;">${t('doc_trade')}</label>
      <input id="doc-trade" type="text" list="trade-options" value="${existing?.trade || ''}" placeholder="e.g. Electrical (leave blank = visible to all subs)" />

      <label class="field" style="margin-top: 12px;">${t('doc_notes')}</label>
      <textarea id="doc-notes" rows="2">${existing?.notes || ''}</textarea>

      <div style="display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;">
        <button class="btn" id="doc-cancel">${t('cancel')}</button>
        <button class="btn btn-primary" id="doc-save">${t('save')}</button>
      </div>
    `;
    if (existing) m.querySelector('#doc-cat').value = existing.category;
    m.querySelector('#doc-cancel').onclick = () => { close(); openProjectDocsDialog(projectId); };
    m.querySelector('#doc-save').onclick = async () => {
      const body = {
        category: m.querySelector('#doc-cat').value,
        title_en: m.querySelector('#doc-title-en').value.trim(),
        title_zh: m.querySelector('#doc-title-zh').value.trim() || null,
        dropbox_url: m.querySelector('#doc-url').value.trim(),
        trade: m.querySelector('#doc-trade').value.trim() || null,
        notes: m.querySelector('#doc-notes').value.trim() || null,
      };
      if (!body.title_en) { alert(t('doc_title') + ' (English) required'); return; }
      if (!body.dropbox_url) { alert(t('doc_dropbox_url') + ' required'); return; }
      try {
        if (isEdit) {
          await api(`/api/documents/${existing.id}`, { method: 'PUT', body });
          showToast(t('doc_updated'));
        } else {
          await api(`/api/projects/${projectId}/documents`, { method: 'POST', body });
          showToast(t('doc_added'));
        }
        close();
        openProjectDocsDialog(projectId);
      } catch (e) { alert(e.message); }
    };
  });
}

// --------------------------- Project assignees dialog --------------------
async function openAssigneesDialog(projectId) {
  const project = state.projects.find(p => p.id === projectId);
  const projectName = project
    ? ((state.lang === 'zh' && project.name_zh) ? project.name_zh : project.name_en)
    : '';
  let current;
  try {
    current = await api(`/api/projects/${projectId}/assignees`);
  } catch (e) {
    alert(e.message);
    return;
  }
  const currentIds = new Set(current.map(u => u.id));

  openModal((m, close) => {
    m.style.maxWidth = '500px';

    // All candidate users: workers, crew leads, sub_contacts, dispatchers
    const candidates = state.people.workers.filter(u => u.role !== 'dispatcher' || currentIds.has(u.id));

    const listHtml = candidates.length === 0
      ? `<div class="muted" style="padding: 1rem; text-align: center;">No users available.</div>`
      : candidates.map(u => {
          const name = (state.lang === 'zh' && u.name_zh) ? u.name_zh : u.name_en;
          const checked = currentIds.has(u.id) ? 'checked' : '';
          const roleLabel = u.role === 'crew_lead' ? '班组长' : u.role === 'sub_contact' ? '分包商' : u.role === 'worker' ? '工人' : u.role;
          return `
            <label style="display: flex; align-items: center; gap: 8px; padding: 6px 8px; font-size: 13px; border-bottom: 0.5px solid var(--border);">
              <input type="checkbox" name="pa-user" value="${u.id}" ${checked} />
              <span style="flex: 1;">${name} <span class="muted" style="font-size: 10px;">(${roleLabel}${u.trade ? ' · ' + u.trade : ''})</span></span>
            </label>
          `;
        }).join('');

    m.innerHTML = `
      <h3 style="margin: 0 0 16px;">👥 ${t('assign_people')} — ${projectName}</h3>
      <div style="max-height: 60vh; overflow-y: auto; background: var(--background); border-radius: 6px; padding: 4px 0;">
        ${listHtml}
      </div>
      <div style="display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;">
        <button class="btn" id="pa-cancel">${t('cancel')}</button>
        <button class="btn btn-primary" id="pa-save">${t('save')}</button>
      </div>
    `;

    m.querySelector('#pa-cancel').onclick = close;
    m.querySelector('#pa-save').onclick = async () => {
      const ids = Array.from(m.querySelectorAll('input[name="pa-user"]:checked')).map(i => Number(i.value));
      try {
        await api(`/api/projects/${projectId}/assignees`, { method: 'PUT', body: { user_ids: ids } });
        showToast(t('assignees_updated'));
        close();
      } catch (e) { alert(e.message); }
    };
  });
}

bootstrap();
</script>
</body>
</html>
